name: Bug Report
description: Report a problem with the GWM ORA integration
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: version
    attributes:
      label: Integration version
      description: Version from manifest.json or HACS
      placeholder: "1.0.7"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Enable debug logging for `custom_components.ora` in your configuration.yaml, then paste relevant logs.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help diagnose the issue.
